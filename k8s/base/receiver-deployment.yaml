apiVersion: apps/v1
kind: Deployment

metadata:
  name: receiver

  labels:
    app.kubernetes.io/name: receiver
    app.kubernetes.io/component: receiver

spec:
  replicas: 3

  selector:
    matchLabels:
      app.kubernetes.io/name: receiver

  template:
    metadata:
      labels:
        app.kubernetes.io/name: receiver
        app.kubernetes.io/component: receiver

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      containers:
        - name: receiver

          image: telemetry-receiver:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: telemetry-config

            - secretRef:
                name: telemetry-secret

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          startupProbe:
            httpGet:
              path: /health
              port: 8000

            failureThreshold: 30
            periodSeconds: 2

          readinessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 10
