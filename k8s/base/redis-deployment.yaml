apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis

  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: redis

  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: redis

    spec:
      containers:
        - name: redis

          image: redis:7-alpine

          ports:
            - containerPort: 6379

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 5
            periodSeconds: 5
