apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: receiver
  namespace: telemetry

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: receiver

  minReplicas: 3
  maxReplicas: 10

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 60
