services:
  redis:
    image: redis:8-alpine
    container_name: redis

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile

    container_name: dashboard

    depends_on:
      - redis

    ports:
      - "8000:8000"

  receiver-1:
    build:
      context: .
      dockerfile: docker/receiver/Dockerfile

    container_name: receiver-1

    ports:
      - "9001:8000"

  receiver-2:
    build:
      context: .
      dockerfile: docker/receiver/Dockerfile

    container_name: receiver-2

    ports:
      - "9002:8000"

  receiver-3:
    build:
      context: .
      dockerfile: docker/receiver/Dockerfile

    container_name: receiver-3

    ports:
      - "9003:8000"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile

    container_name: nginx

    depends_on:
      - receiver-1
      - receiver-2
      - receiver-3

    ports:
      - "8080:80"

  generator-1:
    build:
      context: .
      dockerfile: docker/generator/Dockerfile

    container_name: generator-1

    environment:
      GENERATOR_NAME: generator-1

    ports:
      - "9101:8000"

    depends_on:
      - redis
      - nginx

  generator-2:
    build:
      context: .
      dockerfile: docker/generator/Dockerfile

    container_name: generator-2

    environment:
      GENERATOR_NAME: generator-2

    ports:
      - "9102:8000"

    depends_on:
      - redis
      - nginx

  generator-3:
    build:
      context: .
      dockerfile: docker/generator/Dockerfile

    container_name: generator-3

    environment:
      GENERATOR_NAME: generator-3

    ports:
      - "9103:8000"

    depends_on:
      - redis
      - nginx

  prometheus:
    image: prom/prometheus:v3.5.0

    container_name: prometheus

    command:
      - --config.file=/etc/prometheus/prometheus.yml

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
