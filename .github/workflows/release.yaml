name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: onerohandesai
  IMAGE_TAG: ${{ github.sha }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generator
      - name: Build and Push Generator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/generator/Dockerfile
          push: true
          tags: |
            ghcr.io/onerohandesai/telemetry-generator:${{ env.IMAGE_TAG }}
            ghcr.io/onerohandesai/telemetry-generator:latest

      # Receiver
      - name: Build and Push Receiver
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/receiver/Dockerfile
          push: true
          tags: |
            ghcr.io/onerohandesai/telemetry-receiver:${{ env.IMAGE_TAG }}
            ghcr.io/onerohandesai/telemetry-receiver:latest

      # Dashboard
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/onerohandesai/telemetry-dashboard:${{ env.IMAGE_TAG }}
            ghcr.io/onerohandesai/telemetry-dashboard:latest

      # Nginx
      - name: Build and Push Nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/onerohandesai/telemetry-nginx:${{ env.IMAGE_TAG }}
            ghcr.io/onerohandesai/telemetry-nginx:latest

      # Update Helm Image Tag
      - name: Update Helm Values
        run: |
          sed -i "s/^imageTag:.*/imageTag: ${IMAGE_TAG}/" deploy/helm/telemetry-playground/values.yaml

      # Commit Updated Helm Values
      - name: Commit Updated Image Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/telemetry-playground/values.yaml

          git diff --cached --quiet && exit 0

          git commit -m "chore: update image tag to ${IMAGE_TAG}"

          git push
