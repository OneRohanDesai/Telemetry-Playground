apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    app: redis

spec:
  replicas: {{ .Values.replicas.redis }}

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: {{ .Values.image.redis }}
          ports:
            - name: http
              containerPort: 6379
              protocol: TCP
