apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Values.namespace }}
  labels:
    app: dashboard

spec:
  replicas: {{ .Values.replicas.dashboard }}

  selector:
    matchLabels:
      app: dashboard

  template:
    metadata:
      labels:
        app: dashboard

    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.dashboard }}:{{ .Values.imageTag }}"
          imagePullPolicy: IfNotPresent

          env:
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"

            - name: GENERATOR_REPLICAS
              value: "{{ .Values.replicas.generator }}"

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc

            - name: OTEL_SERVICE_NAME
              value: dashboard

            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=telemetry

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
