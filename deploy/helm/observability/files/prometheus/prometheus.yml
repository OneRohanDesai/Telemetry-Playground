global:
  scrape_interval: 5s

scrape_configs:
  - job_name: generators

    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      - source_labels:
          - __meta_kubernetes_namespace
        action: keep
        regex: telemetry

      - source_labels:
          - __meta_kubernetes_pod_label_app
        action: keep
        regex: generator

      - source_labels:
          - __meta_kubernetes_pod_container_port_number
        action: keep
        regex: "8000"

      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)

      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace

      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod

  - job_name: receivers

    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      - source_labels:
          - __meta_kubernetes_namespace
        action: keep
        regex: telemetry

      - source_labels:
          - __meta_kubernetes_pod_label_app
        action: keep
        regex: receiver

      - source_labels:
          - __meta_kubernetes_pod_container_port_number
        action: keep
        regex: "8000"

      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)

      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace

      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
