apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  labels:
    app: grafana
spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana

          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "{{ .Values.grafana.adminUser }}"

            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "{{ .Values.grafana.adminPassword }}"

          volumeMounts:
            # Datasources
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources

            # Dashboard provider
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards

            # Dashboards
            - name: dashboard-overview
              mountPath: /var/lib/grafana/dashboards/telemetry-overview

            - name: dashboard-generators
              mountPath: /var/lib/grafana/dashboards/generators

            - name: dashboard-receivers
              mountPath: /var/lib/grafana/dashboards/receivers

            - name: dashboard-infrastructure
              mountPath: /var/lib/grafana/dashboards/infrastructure

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        # Datasource provisioning
        - name: datasources
          configMap:
            name: grafana-datasources

        # Dashboard provider provisioning
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider

        # Dashboard JSON ConfigMaps
        - name: dashboard-overview
          configMap:
            name: grafana-dashboard-overview

        - name: dashboard-generators
          configMap:
            name: grafana-dashboard-generators

        - name: dashboard-receivers
          configMap:
            name: grafana-dashboard-receivers

        - name: dashboard-infrastructure
          configMap:
            name: grafana-dashboard-infrastructure
