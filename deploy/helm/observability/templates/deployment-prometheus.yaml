apiVersion: apps/v1
kind: Deployment

metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.prometheus.replicas }}

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus

          image: "{{ .Values.prometheus.image }}:{{ .Values.prometheus.tag }}"

          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus

            - name: data
              mountPath: /prometheus

          resources:
            requests:
              cpu: {{ .Values.resources.prometheus.cpu }}
              memory: {{ .Values.resources.prometheus.memory }}
            limits:
              cpu: {{ .Values.resources.prometheus.cpu }}
              memory: {{ .Values.resources.prometheus.memory }}

      volumes:
        - name: config
          configMap:
            name: prometheus-config

        - name: data
          emptyDir: {}
