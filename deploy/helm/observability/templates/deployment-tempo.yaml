apiVersion: apps/v1
kind: Deployment

metadata:
  name: tempo
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.tempo.replicas }}

  selector:
    matchLabels:
      app: tempo

  template:
    metadata:
      labels:
        app: tempo

    spec:
      containers:

        - name: tempo

          image: "{{ .Values.tempo.image }}:{{ .Values.tempo.tag }}"

          args:
            - "-config.file=/etc/tempo/tempo.yml"

          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318

          volumeMounts:

            - name: config
              mountPath: /etc/tempo

            - name: storage
              mountPath: /var/tempo

      volumes:

        - name: config
          configMap:
            name: tempo-config

        - name: storage
          emptyDir: {}
