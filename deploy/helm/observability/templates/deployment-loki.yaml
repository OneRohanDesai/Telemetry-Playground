apiVersion: apps/v1
kind: Deployment

metadata:
  name: loki

spec:
  replicas: {{ .Values.loki.replicas }}

  selector:
    matchLabels:
      app: loki

  template:
    metadata:
      labels:
        app: loki

    spec:
      containers:
        - name: loki

          image: {{ .Values.loki.image }}

          args:
            - "-config.file=/etc/loki/config.yml"

          ports:
            - containerPort: 3100

          volumeMounts:
            - name: config
              mountPath: /etc/loki

      volumes:
        - name: config
          configMap:
            name: loki-config
